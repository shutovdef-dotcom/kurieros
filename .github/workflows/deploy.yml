name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install, build, and upload Astro site
        uses: withastro/action@v3
        env:
          SITE_URL: https://kurerok.ru
          SITE_BASE: /
          PUBLIC_GA4_MEASUREMENT_ID: G-686FXGHBWB
          PUBLIC_YANDEX_METRIKA_ID: 108655359
          PUBLIC_OWNER_SEO_HASH: f08d870722fc49f961b4bddb87fe6b15c226f7880c5cc1da17697ce9be527073
          PUBLIC_GSC_PROPERTY_URL: sc-domain:kurerok.ru
          PUBLIC_YANDEX_WEBMASTER_HOST: https:kurerok.ru:443
          PUBLIC_YANDEX_VERIFICATION: ac1cd99571b69d37
          PUBLIC_GOOGLE_SITE_VERIFICATION: QIGlMj-JAXkxvnkeFNNu6hWJ5bslKtguuUxY4ty17bI
        with:
          path: ./kurieros-astro
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
